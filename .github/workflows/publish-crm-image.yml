name: Publish CRM Image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "hml"
        type: choice
        options:
          - hml
          - prod
      api_base_url:
        description: "WAssisBE API base URL baked into the CRM build"
        required: true
        default: "https://api20-hml.wassis.com.br"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/wassis-erp/wassis-crm
  HML_API_BASE_URL: https://api20-hml.wassis.com.br
  PROD_API_BASE_URL: https://api20.wassis.com.br

jobs:
  publish:
    name: Build, Push and Redeploy CRM Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        env:
          HML_WEBHOOK_URL: ${{ secrets.PORTAINER_CRM_HML_WEBHOOK_URL }}
          PROD_WEBHOOK_URL: ${{ secrets.PORTAINER_CRM_PROD_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api_base_url=${{ inputs.api_base_url }}" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.environment }}" = "prod" ]; then
              echo "tag=latest" >> "$GITHUB_OUTPUT"
              echo "webhook_url=${PROD_WEBHOOK_URL}" >> "$GITHUB_OUTPUT"
            else
              echo "tag=hml" >> "$GITHUB_OUTPUT"
              echo "webhook_url=${HML_WEBHOOK_URL}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tag=hml" >> "$GITHUB_OUTPUT"
            echo "api_base_url=${{ env.HML_API_BASE_URL }}" >> "$GITHUB_OUTPUT"
            echo "webhook_url=${HML_WEBHOOK_URL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./nexus-crm/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ steps.meta.outputs.api_base_url }}
            VITE_AUTH_MODE=backend
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger Portainer service redeploy
        env:
          WEBHOOK_URL: ${{ steps.meta.outputs.webhook_url }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::Portainer webhook secret is not configured for the selected environment."
            exit 1
          fi

          separator='?'
          case "$WEBHOOK_URL" in
            *\?*) separator='&' ;;
          esac

          response_file="$(mktemp)"
          status_code="$(curl \
            --silent \
            --show-error \
            --location \
            --request POST \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 90 \
            --output "$response_file" \
            --write-out '%{http_code}' \
            "${WEBHOOK_URL}${separator}tag=${IMAGE_TAG}")"

          cat "$response_file"
          if [ "$status_code" != "202" ]; then
            echo "::error::Expected HTTP 202 from a Portainer service webhook, received ${status_code}. Configure a service webhook instead of a stack GitOps webhook."
            exit 1
          fi

          {
            echo "### Portainer redeploy"
            echo "- Image: \`${IMAGE_NAME}:${IMAGE_TAG}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Webhook response: HTTP ${status_code}"
          } >> "$GITHUB_STEP_SUMMARY"
