<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-surface); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); width: 92px; flex: none; }
  .d { font-family: var(--font-display); color: var(--fg-1); letter-spacing: var(--tr-tight); line-height: 1.05; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="tag">700 · 44px</span><span class="d" style="font-weight:700;font-size:44px">Proteção que cabe na vida</span></div>
    <div class="row"><span class="tag">600 · 30px</span><span class="d" style="font-weight:600;font-size:30px">Seu seguro, sem complicação</span></div>
    <div class="row"><span class="tag">800 · 24px</span><span class="d" style="font-weight:800;font-size:24px;text-transform:uppercase;letter-spacing:var(--tr-tighter)">Dashboard Comercial</span></div>
  </div>
</body>
</html>
