<!-- @dsCard group="Spacing" viewport="700x160" name="Raios" subtitle="Cantos compactos e sóbrios" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-surface); }
  .row { display: flex; gap: 22px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 72px; height: 56px; background: var(--bg-surface-2); border: 1px solid var(--border-2); }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--r-sm)"></div><span class="n">sm · 4</span></div>
    <div class="col"><div class="box" style="border-radius:var(--r-md)"></div><span class="n">md · 6</span></div>
    <div class="col"><div class="box" style="border-radius:var(--r-lg)"></div><span class="n">lg · 8</span></div>
    <div class="col"><div class="box" style="border-radius:var(--r-xl)"></div><span class="n">xl · 12</span></div>
    <div class="col"><div class="box" style="width:96px;border-radius:var(--r-pill)"></div><span class="n">pill</span></div>
  </div>
</body>
</html>
