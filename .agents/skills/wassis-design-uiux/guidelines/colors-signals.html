<!-- @dsCard group="Colors" viewport="700x160" name="Sinais semânticos" subtitle="Sucesso, alerta, perigo, info" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-surface); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: var(--r-md); }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex: none; }
  .n { font-family: var(--font-text); font-weight: 700; font-size: 13px; }
  .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--signal-success);color:#fff"><span class="dot" style="background:#fff"></span><div><div class="n">Sucesso</div><div class="h">#16A34A</div></div></div>
    <div class="sw" style="background:var(--signal-warning);color:#3a2a00"><span class="dot" style="background:#3a2a00"></span><div><div class="n">Alerta</div><div class="h">#F59E0B</div></div></div>
    <div class="sw" style="background:var(--signal-danger);color:#fff"><span class="dot" style="background:#fff"></span><div><div class="n">Perigo</div><div class="h">#DC2626</div></div></div>
    <div class="sw" style="background:var(--signal-info);color:#fff"><span class="dot" style="background:#fff"></span><div><div class="n">Info</div><div class="h">#004FC2</div></div></div>
  </div>
</body>
</html>
