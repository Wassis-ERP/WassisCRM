<!-- @dsCard group="Colors" viewport="700x210" name="Ramos de seguro" subtitle="Cor oficial por ramo (manual p.18)" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 32px; background: var(--bg-surface); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 52px; border-radius: var(--r-md); }
  .n { font-family: var(--font-text); font-weight: 700; font-size: 12px; color: var(--fg-1); }
  .h { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--brand-green)"></div><div class="n">Saúde</div><div class="h">#005938</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-orange)"></div><div class="n">Vida</div><div class="h">#FF5400</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-blue)"></div><div class="n">Auto</div><div class="h">#004FC2</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-blue-deep)"></div><div class="n">Moto</div><div class="h">#053D96</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-purple)"></div><div class="n">Residência</div><div class="h">#5C4091</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-red)"></div><div class="n">Empresarial</div><div class="h">#AB120D</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-ink)"></div><div class="n">Portáteis</div><div class="h">#303030</div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-peach)"></div><div class="n">Previdência</div><div class="h">#F09957</div></div>
  </div>
</body>
</html>
