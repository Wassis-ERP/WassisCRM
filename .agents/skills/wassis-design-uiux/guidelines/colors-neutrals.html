<!-- @dsCard group="Colors" viewport="700x150" name="Neutros" subtitle="Escala cinza levemente azulada · 0–950" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-surface); }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--r-sm); border: 1px solid var(--border-1); }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 6px; text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--neutral-0)"></div><div class="n">0</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-50)"></div><div class="n">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-100)"></div><div class="n">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-200)"></div><div class="n">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-300)"></div><div class="n">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-400)"></div><div class="n">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-500)"></div><div class="n">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-600)"></div><div class="n">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-700)"></div><div class="n">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-800)"></div><div class="n">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-900)"></div><div class="n">900</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-950)"></div><div class="n">950</div></div>
  </div>
</body>
</html>
