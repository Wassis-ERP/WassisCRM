<!-- @dsCard group="Spacing" viewport="700x160" name="Espaçamento" subtitle="Grid de 4pt" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-surface); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--accent-primary-soft); border: 1px solid var(--accent-primary); border-radius: var(--r-sm); width: 100%; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); white-space: nowrap; }
</style>
</head>
<body>
  <div class="row">
    <div class="col" style="width:24px"><div class="bar" style="height:4px"></div><span class="n">1·4</span></div>
    <div class="col" style="width:24px"><div class="bar" style="height:8px"></div><span class="n">2·8</span></div>
    <div class="col" style="width:24px"><div class="bar" style="height:12px"></div><span class="n">3·12</span></div>
    <div class="col" style="width:28px"><div class="bar" style="height:16px"></div><span class="n">4·16</span></div>
    <div class="col" style="width:32px"><div class="bar" style="height:24px"></div><span class="n">6·24</span></div>
    <div class="col" style="width:40px"><div class="bar" style="height:32px"></div><span class="n">8·32</span></div>
    <div class="col" style="width:48px"><div class="bar" style="height:48px"></div><span class="n">12·48</span></div>
    <div class="col" style="width:64px"><div class="bar" style="height:64px"></div><span class="n">16·64</span></div>
  </div>
</body>
</html>
