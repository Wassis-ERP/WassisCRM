<!-- @dsCard group="Colors" viewport="700x180" name="Marca — Primárias" subtitle="Azul, azul escuro e ink W.Assis" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-surface); }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border-1); }
  .chip { height: 88px; }
  .meta { padding: 10px 12px; }
  .meta .n { font-family: var(--font-text); font-weight: 700; font-size: 13px; color: var(--fg-1); }
  .meta .h { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--brand-blue)"></div><div class="meta"><div class="n">Azul W.Assis</div><div class="h">#004FC2 · --brand-blue</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-blue-deep)"></div><div class="meta"><div class="n">Azul escuro</div><div class="h">#053D96 · --brand-blue-deep</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-ink)"></div><div class="meta"><div class="n">Ink</div><div class="h">#303030 · --brand-ink</div></div></div>
  </div>
</body>
</html>
