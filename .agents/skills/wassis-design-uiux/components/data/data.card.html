<!-- @dsCard group="Components" viewport="700x300" name="Cards & dados" subtitle="Card, KpiCard e Avatar" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-app); }
  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, KpiCard, Avatar, StatusBadge } = window.WAssisDesignSystem_502d77
  const I = (n) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{n}</svg>
  const Dollar = I(<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>)
  const UsersIcon = I(<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></>)
  const Target = I(<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>)
  function Demo() {
    return (
      <div>
        <div className="kpis">
          <KpiCard title="Receita Total" value="R$ 2.847.500" change="+18.2%" trend="up" icon={Dollar} iconColor="var(--signal-success)" />
          <KpiCard title="Novos Segurados" value="1.284" change="+12.5%" trend="up" icon={UsersIcon} iconColor="var(--accent-primary)" />
          <KpiCard title="Taxa de Conversão" value="34.8%" change="-2.1%" trend="down" icon={Target} iconColor="var(--signal-warning)" />
        </div>
        <Card title="Dados do segurado" icon={I(<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>)}
          action={<StatusBadge status="Ativo" />}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <Avatar name="Vinícius Assis" size={48} />
            <div>
              <div style={{ fontFamily: 'var(--font-text)', fontWeight: 700, color: 'var(--fg-1)' }}>Vinícius Assis</div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--fg-3)' }}>CPF 123.456.789-00</div>
            </div>
          </div>
        </Card>
      </div>
    )
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />)
</script>
</body>
</html>
