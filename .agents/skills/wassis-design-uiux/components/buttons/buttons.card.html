<!-- @dsCard group="Components" viewport="700x260" name="Botões" subtitle="Button (variantes, pill CTA, tamanhos) + IconButton" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-surface); }
  .group { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); text-transform: uppercase; letter-spacing: 0.1em; width: 100%; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton } = window.WAssisDesignSystem_502d77
  const I = ({ d, n }) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">{n}</svg>
  const Plus = <I n={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />
  const Dots = <I n={<><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></>} />
  const Close = <I n={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />

  function Demo() {
    return (
      <div>
        <div className="group"><span className="lbl">Variantes</span>
          <Button variant="primary">Salvar</Button>
          <Button variant="secondary">Editar</Button>
          <Button variant="ghost">Cancelar</Button>
          <Button variant="danger">Excluir</Button>
          <Button variant="primary" disabled>Desativado</Button>
        </div>
        <div className="group"><span className="lbl">CTA da marca (pill)</span>
          <Button variant="primary" pill leadingIcon={Plus}>Nova Oportunidade</Button>
          <Button variant="primary" pill size="sm">Novo</Button>
        </div>
        <div className="group"><span className="lbl">Tamanhos</span>
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="primary" size="md">Medium</Button>
          <Button variant="primary" size="lg">Large</Button>
        </div>
        <div className="group"><span className="lbl">IconButton</span>
          <IconButton label="Mais">{Dots}</IconButton>
          <IconButton tone="primary" label="Adicionar">{Plus}</IconButton>
          <IconButton tone="danger" label="Fechar">{Close}</IconButton>
        </div>
      </div>
    )
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />)
</script>
</body>
</html>
